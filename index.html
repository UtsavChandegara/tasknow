<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskNow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1>TaskNow</h1>
    </header>

    <section id="input">
        <input type="text" id="input_field" placeholder="Add a new task...">
        <button id="add_button">Add Task</button>
    </section>

    <section id="active">
        <h2>This Week</h2>
        <ul id="active_tasks"></ul>
    </section>
    
    <section id="completed">
        <h2>Last Week</h2>
        <ul id="completed_tasks"></ul>
    </section>

    <script src="script.js"></script>
</body>
</html>
